<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Krakens Canvas</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Drawing controls">
        <div class="brand">
          <strong>Krakens Canvas</strong>
          <span id="deviceStatus">Pointer ready</span>
        </div>

        <details class="art-bar">
          <summary>Art Bar</summary>
          <div class="art-panel" role="menu" aria-label="Art Bar">
            <div class="art-section">
              <span class="art-label">Pages</span>
              <div class="surface-options" role="group" aria-label="Page surface">
                <button type="button" data-surface="black-grid">Grid</button>
                <button type="button" data-surface="black-blank">Black</button>
                <button type="button" data-surface="white-blank">White</button>
                <button type="button" data-surface="sepia-blank">Sepia</button>
              </div>
            </div>

            <label class="select-control">
              <span>Brush</span>
              <select id="brushSelect" aria-label="Brush style">
                <option value="ink">Ink</option>
                <option value="marker">Marker</option>
                <option value="pencil">Pencil</option>
                <option value="calligraphy">Calligraphy</option>
                <option value="spray">Spray</option>
                <option value="round">Round brush</option>
                <option value="flat">Flat brush</option>
                <option value="dry">Dry brush</option>
                <option value="halftone">Halftone</option>
                <option value="halftone-soft">Soft halftone</option>
              </select>
            </label>

            <details class="art-subpanel" open>
              <summary>Layers</summary>
              <div id="layerList" class="layer-list" aria-label="Layers"></div>
              <div class="layer-actions">
                <button id="addLayerButton" type="button">Add layer</button>
                <label class="select-control layer-opacity-control">
                  <span>Opacity</span>
                  <input id="layerOpacityInput" type="range" min="0" max="100" value="100">
                </label>
              </div>
            </details>

            <details class="art-subpanel">
              <summary>Transform</summary>
              <div class="transform-controls">
                <label class="select-control">
                  <span>Rotate</span>
                  <input id="transformRotateInput" type="range" min="-180" max="180" value="0">
                </label>
                <label class="select-control">
                  <span>Scale</span>
                  <input id="transformScaleInput" type="range" min="25" max="200" value="100">
                </label>
                <div class="transform-actions">
                  <button id="copySelectionButton" type="button">Copy</button>
                  <button id="pasteSelectionButton" type="button" disabled>Paste</button>
                </div>
                <button id="clearTransformButton" type="button">Clear selection</button>
              </div>
            </details>

            <label class="toggle-control theme-control">
              <input id="themeToggle" type="checkbox">
              <span>Light mode</span>
            </label>
          </div>
        </details>

        <div class="page-control" aria-label="Pages">
          <div id="pageTabs" class="page-tabs" role="tablist" aria-label="Canvas pages"></div>
          <button id="addPageButton" type="button" aria-label="Add page">+</button>
        </div>

        <div class="control-group" role="group" aria-label="Tools">
          <button class="tool-button is-active" type="button" data-tool="pen" aria-pressed="true">Pen</button>
          <button class="tool-button" type="button" data-tool="eraser" aria-pressed="false">Eraser</button>
          <button class="tool-button" type="button" data-tool="transform" aria-pressed="false">Transform</button>
          <button class="tool-button" type="button" data-tool="pan" aria-pressed="false">Pan</button>
        </div>

        <label class="slider-control">
          <span>Size</span>
          <input id="sizeInput" type="range" min="2" max="48" value="14">
        </label>

        <label class="slider-control">
          <span>Spill</span>
          <input id="spillInput" type="range" min="0" max="100" value="48">
        </label>

        <label class="slider-control">
          <span>Smooth</span>
          <input id="smoothInput" type="range" min="0" max="95" value="42">
        </label>

        <div class="ink-control" aria-label="Ink color">
          <span>Ink</span>
          <div class="swatches" role="group" aria-label="Ink color presets">
            <button class="swatch is-active" type="button" data-color="#e2e0da" aria-label="Warm white ink" style="--swatch: #e2e0da"></button>
            <button class="swatch" type="button" data-color="#86adc4" aria-label="Muted blue ink" style="--swatch: #86adc4"></button>
            <button class="swatch" type="button" data-color="#c99d5d" aria-label="Muted amber ink" style="--swatch: #c99d5d"></button>
            <button class="swatch" type="button" data-color="#c9667c" aria-label="Muted rose ink" style="--swatch: #c9667c"></button>
            <button class="swatch" type="button" data-color="#78b690" aria-label="Muted green ink" style="--swatch: #78b690"></button>
          </div>
          <input id="colorInput" type="color" value="#e2e0da" aria-label="Custom ink color">
        </div>

        <label class="slider-control">
          <span>Grid</span>
          <input id="gridInput" type="range" min="16" max="80" value="28">
        </label>

        <label class="toggle-control">
          <input id="gridToggle" type="checkbox" checked>
          <span>Grid</span>
        </label>

        <label class="toggle-control">
          <input id="focusToggle" type="checkbox">
          <span>Focus</span>
        </label>

        <div class="pressure-readout" aria-label="Live pressure">
          <span>Pressure</span>
          <meter id="pressureMeter" min="0" max="1" value="0"></meter>
          <output id="pressureValue">0.00</output>
        </div>

        <div class="control-group" role="group" aria-label="Canvas actions">
          <button id="undoButton" type="button" disabled>Undo</button>
          <button id="redoButton" type="button" disabled>Redo</button>
          <button id="neatenButton" type="button" title="Neaten recent handwriting (Ctrl+Alt+N)">Neaten</button>
          <button id="clearButton" type="button">Clear</button>
          <button id="saveButton" type="button">Save PNG</button>
          <button id="pinButton" type="button">Pin</button>
          <button id="shareButton" type="button">Share</button>
          <label class="toggle-control auto-share-control">
            <input id="autoShareToggle" type="checkbox">
            <span>Auto</span>
          </label>
        </div>
      </section>

      <section class="board-wrap" aria-label="Drawing board">
        <div id="board" class="board">
          <canvas id="inkCanvas" aria-label="Pressure-sensitive ink canvas"></canvas>
          <div id="eraserCursor" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
